name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.action != 'closed'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt

      - name: Cache cargo tools
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-tools-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Check for typos
        uses: crate-ci/typos@v1

      - name: Install cargo tools
        run: |
          command -v cargo-deny   || cargo install cargo-deny --locked
          command -v cargo-audit  || cargo install cargo-audit --locked

      - name: Lint
        run: just lint

      - name: Check documentation
        run: just doc

      - name: Check dependencies
        run: cargo deny check

      - name: Run tests
        run: just test

      - name: Audit dependencies
        run: cargo audit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event.action != 'closed'
    needs: tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.0

      - name: Cache cargo tools
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('**/Cargo.lock') }}

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Install tarpaulin
        run: cargo install --locked cargo-tarpaulin || true

      - name: Generate coverage report
        run: just coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          disable_search: true
          override_commit: ${{ github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event.pull_request.number }}
          fail_ci_if_error: true

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && github.ref != 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional

      - name: Validate commit messages
        run: |
          npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.sha }} --verbose

  # Build the Docker image on every merge to main (build-only, no push) so a
  # Dockerfile/.dockerignore break surfaces here instead of at release time.
  # Manual ad-hoc builds use the Docker workflow's workflow_dispatch trigger.
  docker-build:
    name: Docker build
    needs: tests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/docker.yml
    with:
      push: false
